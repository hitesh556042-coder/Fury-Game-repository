<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fury Tank 3D</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- External Libraries: Three.js, Cannon.js, GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
</head>
<body>
    <div id="ui-container">
        <div id="crosshair" class="hidden"></div>
        <div id="hud">
            <div id="health-container"><div id="health-bar"></div></div>
            <div id="ammo-container">AMMO: <span id="ammo-text">30 / 30</span></div>
            <div id="reload-status">READY</div>
        </div>
        <canvas id="mini-map" width="150" height="150"></canvas>
    </div>

    <script src="Physics.js"></script>
    <script src="input.js"></script>
    <script src="Camera.js"></script>
    <script src="weapons.js"></script>
    <script src="Tank.js"></script>
    <script src="Terrain.js"></script>
    <script src="enemy.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
